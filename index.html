<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark PC</title>

<style>
:root{
--main:#3483fa;
--bg:#f5f5f5;
--card:#fff;
--text:#333;
--sidebar:#111;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:70px;
background:var(--sidebar);
height:100vh;
position:fixed;
transition:0.3s;
overflow:hidden;
z-index:1000;
}

/* ABRE NO HOVER */
.sidebar:hover{
width:220px;
}

/* MENU */
.menu-item{
display:flex;
align-items:center;
padding:12px;
margin:8px;
background:#222;
border-radius:6px;
cursor:pointer;
color:#fff;
}

.menu-item span{
margin-left:10px;
opacity:0;
transition:0.2s;
}

/* TEXTO APARECE */
.sidebar:hover .menu-item span{
opacity:1;
}

/* MAIN */
.main{
margin-left:70px;
width:100%;
transition:0.3s;
}

/* EMPURRA CONTEÚDO */
.sidebar:hover ~ .main{
margin-left:220px;
}

/* HOME */
.hero{
padding:40px;
text-align:center;
}

/* PRODUTOS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.product{
background:var(--card);
padding:10px;
border-radius:8px;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.price{
color:var(--main);
font-weight:bold;
}

button{
background:var(--main);
color:#fff;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

/* ADMIN */
.admin{
padding:20px;
max-width:900px;
margin:auto;
}

input,textarea{
width:100%;
padding:8px;
margin-top:8px;
}

.admin-item{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.hidden{display:none;}
.empty{text-align:center;padding:40px;color:#777;}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="menu-item" onclick="openPage('home')">🏠 <span>Home</span></div>
<div class="menu-item" onclick="openPage('catalog')">🛒 <span>Produtos</span></div>
<div class="menu-item" onclick="openPage('services')">🛠️ <span>Serviços</span></div>
<div class="menu-item" onclick="openPage('adminLogin')">🔒 <span>Admin</span></div>

</div>

<div class="main">

<!-- HOME -->
<div id="home">
<div class="hero">
<h1 id="storeName">Mark PC</h1>
<p id="homeText">Loja completa de peças e serviços de informática.</p>
</div>
</div>

<!-- PRODUTOS -->
<div id="catalog" class="hidden">
<div id="products" class="products"></div>
</div>

<!-- SERVIÇOS -->
<div id="services" class="hidden">
<div class="admin">
<h2>Serviços</h2>
<div id="serviceList"></div>
</div>
</div>

<!-- LOGIN -->
<div id="adminLogin" class="admin hidden">
<h2>Login</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="admin hidden">

<h2>Admin</h2>

<h3>🎨 Personalização</h3>
<input id="colorMain" placeholder="Cor principal (#fff)">
<input id="colorBg" placeholder="Cor fundo (#000)">
<input id="storeInput" placeholder="Nome da loja">
<textarea id="homeInput" placeholder="Texto da home"></textarea>
<button onclick="saveCustom()">Salvar</button>

<h3>📦 Produtos</h3>
<input id="title" placeholder="Nome">
<input id="price" placeholder="Preço">
<input id="stock" placeholder="Estoque">
<input type="file" id="image">
<button onclick="addProduct()">Adicionar</button>

<div id="adminProducts"></div>

<h3>🛠️ Serviços</h3>
<input id="serviceName" placeholder="Nome">
<textarea id="serviceDesc" placeholder="Descrição"></textarea>
<button onclick="addService()">Adicionar</button>

<div id="adminServices"></div>

<h3>📲 WhatsApp</h3>
<input id="zap" placeholder="https://wa.me/...">
<button onclick="saveZap()">Salvar</button>

</div>

</div>

<script>

/* PÁGINAS */
function openPage(p){
['home','catalog','services','adminLogin','adminPanel'].forEach(id=>{
document.getElementById(id).classList.add('hidden')
})
document.getElementById(p).classList.remove('hidden')
loadAll()
}

/* LOGIN */
function login(){
let a=JSON.parse(localStorage.admins||'[{"user":"admin","pass":"123"}]')
let ok=a.find(x=>x.user===user.value && x.pass===pass.value)
if(ok) openPage('adminPanel')
else alert("Erro")
}

/* PERSONALIZAÇÃO */
function saveCustom(){
if(colorMain.value) document.documentElement.style.setProperty('--main',colorMain.value)
if(colorBg.value) document.documentElement.style.setProperty('--bg',colorBg.value)

if(storeInput.value){
localStorage.name=storeInput.value
storeName.innerText=storeInput.value
}

if(homeInput.value){
localStorage.homeText=homeInput.value
homeText.innerText=homeInput.value
}
}

/* PRODUTOS */
function addProduct(){
let r=new FileReader()
r.onload=function(){
let list=JSON.parse(localStorage.products||"[]")
list.push({title:title.value,price:price.value,stock:stock.value,img:r.result})
localStorage.products=JSON.stringify(list)
loadAll()
}
r.readAsDataURL(image.files[0])
}

function loadProducts(){
let list=JSON.parse(localStorage.products||"[]")
products.innerHTML=""

if(list.length===0){
products.innerHTML='<div class="empty">Produtos disponíveis em breve</div>'
return
}

list.forEach((p,i)=>{
products.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div>${p.title}</div>
<div class="price">R$ ${p.price}</div>
<div>Estoque: ${p.stock}</div>
</div>`
})
}

function loadAdminProducts(){
let list=JSON.parse(localStorage.products||"[]")
adminProducts.innerHTML=""

list.forEach((p,i)=>{
adminProducts.innerHTML+=`
<div class="admin-item">
${p.title} - R$ ${p.price}
<button onclick="deleteProduct(${i})">Excluir</button>
</div>`
})
}

function deleteProduct(i){
let list=JSON.parse(localStorage.products||"[]")
list.splice(i,1)
localStorage.products=JSON.stringify(list)
loadAll()
}

/* SERVIÇOS */
function addService(){
let list=JSON.parse(localStorage.services||"[]")
list.push({name:serviceName.value,desc:serviceDesc.value})
localStorage.services=JSON.stringify(list)
loadAll()
}

function loadServices(){
let list=JSON.parse(localStorage.services||"[]")
serviceList.innerHTML=""

if(list.length===0){
serviceList.innerHTML='<div class="empty">Serviços disponíveis em breve</div>'
return
}

list.forEach(s=>{
serviceList.innerHTML+=`<b>${s.name}</b><br>${s.desc}<hr>`
})
}

function loadAdminServices(){
let list=JSON.parse(localStorage.services||"[]")
adminServices.innerHTML=""

list.forEach((s,i)=>{
adminServices.innerHTML+=`
<div class="admin-item">
${s.name}
<button onclick="deleteService(${i})">Excluir</button>
</div>`
})
}

function deleteService(i){
let list=JSON.parse(localStorage.services||"[]")
list.splice(i,1)
localStorage.services=JSON.stringify(list)
loadAll()
}

/* WHATS */
function saveZap(){
localStorage.zap=zap.value
}

/* LOAD */
function loadAll(){
loadProducts()
loadServices()
loadAdminProducts()
loadAdminServices()

if(localStorage.name) storeName.innerText=localStorage.name
if(localStorage.homeText) homeText.innerText=localStorage.homeText
}

loadAll()

</script>

</body>
</html>
