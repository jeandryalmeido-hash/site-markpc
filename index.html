<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark PC</title>

<style>
:root{
--main:#3483fa;
--bg:#0f1115;
--card:#1a1d24;
--text:#fff;
--sidebar:#0a0c10;
--btn:#25D366;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:70px;
background:var(--sidebar);
height:100vh;
position:fixed;
transition:.3s;
overflow:hidden;
}
.sidebar:hover{width:230px;}

.menu-item{
display:flex;
align-items:center;
padding:12px;
margin:8px;
background:#15181f;
border-radius:8px;
cursor:pointer;
}
.menu-item span{opacity:0;margin-left:10px;}
.sidebar:hover span{opacity:1}

/* MAIN */
.main{margin-left:70px;width:100%;transition:.3s;}
.sidebar:hover ~ .main{margin-left:230px}

/* BANNER */
.banner{width:100%;height:250px;object-fit:cover}

/* LOGO */
.logo{width:120px;margin-top:10px}

/* SECTIONS */
.section{padding:30px;text-align:center}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

/* CARD */
.card{
background:var(--card);
padding:15px;
border-radius:12px;
transition:.3s;
}
.card:hover{transform:scale(1.03);}

/* IMG */
.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

/* PRICE */
.price{color:#00ff88;font-weight:bold}

/* BOTÃO */
.btnZap{
background:var(--btn);
padding:10px;
border-radius:8px;
color:#fff;
text-decoration:none;
display:block;
margin-top:10px;
text-align:center;
}

/* REMOVER */
.removeBtn{
background:#ff4d4d;
margin-top:8px;
}

/* EMPTY */
.empty{opacity:.6;margin-top:20px}

/* ADMIN */
.admin{padding:20px;max-width:900px;margin:auto}
input{width:100%;padding:8px;margin-top:8px}
button{padding:10px;margin-top:10px;cursor:pointer}

.hidden{display:none}
</style>
</head>

<body>

<div class="sidebar">
<div class="menu-item" onclick="openPage('home')">🏠 <span>Home</span></div>
<div class="menu-item" onclick="openPage('services')">🛠️ <span>Serviços</span></div>
<div class="menu-item" onclick="openPage('products')">🛒 <span>Produtos</span></div>
<div class="menu-item" onclick="openPage('adminLogin')">🔒 <span>Admin</span></div>
</div>

<div class="main">

<!-- HOME -->
<div id="home">
<img id="banner" class="banner">
<div class="section">
<img id="logo" class="logo">
<h1>Computador lento?</h1>
<p>Deixamos seu PC como novo</p>
<a id="zapBtn" class="btnZap">WhatsApp</a>
</div>
</div>

<!-- SERVIÇOS -->
<div id="services" class="section hidden">
<h2>Serviços</h2>
<div id="serviceList" class="grid"></div>
<div id="emptyService" class="empty hidden">Serviços em breve!</div>
</div>

<!-- PRODUTOS -->
<div id="products" class="section hidden">
<h2>Produtos</h2>
<div id="productList" class="grid"></div>
<div id="emptyProduct" class="empty hidden">Produtos em breve!</div>
</div>

<!-- LOGIN -->
<div id="adminLogin" class="admin hidden">
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="admin hidden">

<h2>Admin</h2>

<h3>🖼️ Banner / Logo</h3>
<input type="file" id="bannerInput">
<input type="file" id="logoInput">

<h3>📲 Whats</h3>
<input id="zapInput">

<h3>🛠️ Serviços</h3>
<input id="srvName">
<input id="srvPrice">
<input type="file" id="srvImg">
<button onclick="addService()">Adicionar</button>
<div id="adminServices"></div>

<h3>🛒 Produtos</h3>
<input id="prdName">
<input id="prdPrice">
<input type="file" id="prdImg">
<button onclick="addProduct()">Adicionar</button>
<div id="adminProducts"></div>

<button onclick="saveAll()">Salvar</button>

</div>

</div>

<script>

function openPage(p){
['home','services','products','adminLogin','adminPanel'].forEach(id=>{
document.getElementById(id).classList.add('hidden')
})
document.getElementById(p).classList.remove('hidden')
loadAll()
}

function login(){
if(user.value==='admin' && pass.value==='123') openPage('adminPanel')
}

/* SALVAR */
function saveAll(){
if(bannerInput.files[0]){
let r=new FileReader()
r.onload=()=>{localStorage.banner=r.result;loadAll()}
r.readAsDataURL(bannerInput.files[0])
}

if(logoInput.files[0]){
let r=new FileReader()
r.onload=()=>{localStorage.logo=r.result;loadAll()}
r.readAsDataURL(logoInput.files[0])
}

localStorage.zap=zapInput.value
}

/* SERVIÇO */
function addService(){
let r=new FileReader()
r.onload=function(){
let list=JSON.parse(localStorage.srv||"[]")
list.push({name:srvName.value,price:srvPrice.value,img:r.result})
localStorage.srv=JSON.stringify(list)
loadAll()
}
r.readAsDataURL(srvImg.files[0])
}

function deleteService(i){
let list=JSON.parse(localStorage.srv||"[]")
list.splice(i,1)
localStorage.srv=JSON.stringify(list)
loadAll()
}

/* PRODUTO */
function addProduct(){
let r=new FileReader()
r.onload=function(){
let list=JSON.parse(localStorage.prd||"[]")
list.push({name:prdName.value,price:prdPrice.value,img:r.result})
localStorage.prd=JSON.stringify(list)
loadAll()
}
r.readAsDataURL(prdImg.files[0])
}

function deleteProduct(i){
let list=JSON.parse(localStorage.prd||"[]")
list.splice(i,1)
localStorage.prd=JSON.stringify(list)
loadAll()
}

/* LOAD */
function loadAll(){

if(localStorage.banner) banner.src=localStorage.banner
if(localStorage.logo) logo.src=localStorage.logo

if(localStorage.zap){
zapBtn.href=localStorage.zap
}

/* SERVIÇOS */
let s=JSON.parse(localStorage.srv||"[]")
serviceList.innerHTML=""
adminServices.innerHTML=""

if(s.length===0){
emptyService.classList.remove('hidden')
}else{
emptyService.classList.add('hidden')
}

s.forEach((x,i)=>{
let msg=encodeURIComponent(`Olá quero o serviço ${x.name} R$ ${x.price}`)

serviceList.innerHTML+=`
<div class="card">
<img src="${x.img}">
<h3>${x.name}</h3>
<div class="price">R$ ${x.price}</div>
<a class="btnZap" target="_blank" href="${localStorage.zap}?text=${msg}">
Comprar no WhatsApp
</a>
</div>`

adminServices.innerHTML+=`
<div class="card">
${x.name}
<button class="removeBtn" onclick="deleteService(${i})">Remover</button>
</div>`
})

/* PRODUTOS */
let p=JSON.parse(localStorage.prd||"[]")
productList.innerHTML=""
adminProducts.innerHTML=""

if(p.length===0){
emptyProduct.classList.remove('hidden')
}else{
emptyProduct.classList.add('hidden')
}

p.forEach((x,i)=>{
productList.innerHTML+=`
<div class="card">
<img src="${x.img}">
<h3>${x.name}</h3>
<div class="price">R$ ${x.price}</div>
</div>`

adminProducts.innerHTML+=`
<div class="card">
${x.name}
<button class="removeBtn" onclick="deleteProduct(${i})">Remover</button>
</div>`
})

}

loadAll()

</script>

</body>
</html>
