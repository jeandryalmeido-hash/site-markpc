<<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b0d12;
color:#fff;
font-family:Arial;
}

.box{
background:#12151c;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
background:#6c3bff;
color:#fff;
border-radius:8px;
cursor:pointer;
}

.error{
color:red;
display:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Login Admin</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="error" class="error">Login errado</div>
</div>

<script>
if(localStorage.admin==='true'){
window.location='admin.html'
}

function login(){
if(user.value==='admin' && pass.value==='1234'){
localStorage.admin='true'
window.location='admin.html'
}else{
error.style.display='block'
}
}
</script>

</body>
</html>
