<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark PC</title>

<style>

:root{
--main:#1e6bff;
--bg:#0b0b0f;
--card:#15151b;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:#fff;
}

header{
background:#111;
border-bottom:1px solid #222;
}

.nav{
max-width:1200px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:900;
color:var(--main);
}

.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.menu a{
color:#fff;
text-decoration:none;
background:#1a1a22;
padding:8px 14px;
border-radius:6px;
}

.menu a:hover{
background:var(--main);
}

.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(120deg,#0b0b0f,#141420);
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:0;
background:#1a1a22;
color:#fff;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.product{
background:var(--card);
border-radius:10px;
overflow:hidden;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-title{
font-weight:bold;
margin-bottom:5px;
}

.price{
color:var(--main);
font-weight:bold;
font-size:18px;
}

.whats{
display:block;
margin-top:10px;
background:#25D366;
color:#fff;
text-align:center;
padding:10px;
border-radius:6px;
text-decoration:none;
}

.admin{
max-width:600px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:0;
background:#1a1a22;
color:white;
}

button{
background:var(--main);
border:0;
padding:10px;
margin-top:10px;
border-radius:6px;
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

@media (max-width:700px){

.nav{
flex-direction:column;
gap:10px;
}

.menu{
justify-content:center;
}

.hero h1{
font-size:28px;
}

.products{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div class="nav">

<div class="logo">Mark PC</div>

<div class="menu">
<a href="#" onclick="openPage('home')">Home</a>
<a href="#" onclick="openPage('catalog')">Catálogo</a>
<a href="#" onclick="openPage('adminLogin')">Admin</a>
</div>

</div>

</header>

<div id="home">

<div class="hero">

<h1>Mark PC</h1>
<p>Loja de peças de PC</p>

</div>

</div>

<div id="catalog" class="container hidden">

<h2>Produtos</h2>

<div class="search">
<input type="text" id="searchInput" placeholder="Buscar produto..." onkeyup="searchProducts()">
</div>

<div id="products" class="products"></div>

</div>

<div id="adminLogin" class="admin hidden">

<h2>Login Admin</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<div id="adminPanel" class="admin hidden">

<h2>Painel Admin</h2>

<h3>Criar Produto</h3>

<input id="title" placeholder="Nome do produto">
<input id="price" placeholder="Preço">
<textarea id="desc" placeholder="Descrição"></textarea>
<input type="file" id="image">

<button onclick="createProduct()">Publicar Produto</button>

<h3>Configurar WhatsApp</h3>

<input id="whatsappUrlInput" placeholder="Link WhatsApp">

<button onclick="saveSettings()">Salvar</button>

</div>

<script>

function openPage(page){

['home','catalog','adminLogin','adminPanel'].forEach(id=>{
let el=document.getElementById(id)
if(el) el.classList.add('hidden')
})

document.getElementById(page).classList.remove('hidden')

loadProducts()

}

function login(){

let passSaved=localStorage.getItem('adminPass')||'123'

if(user.value==="admin" && pass.value===passSaved){

openPage('adminPanel')

}else{

alert("Login incorreto")

}

}

function saveSettings(){

localStorage.setItem('whatsappUrl',whatsappUrlInput.value)

alert("Salvo")

}

function createProduct(){

let file=image.files[0]

if(!file){
alert("Selecione uma imagem")
return
}

let reader=new FileReader()

reader.onload=function(){

let p={
title:title.value,
price:price.value,
img:reader.result
}

let products=JSON.parse(localStorage.getItem('products')||'[]')

products.push(p)

localStorage.setItem('products',JSON.stringify(products))

loadProducts()

}

reader.readAsDataURL(file)

}

function loadProducts(){

let products=JSON.parse(localStorage.getItem('products')||'[]')

let box=document.getElementById("products")

if(!box) return

box.innerHTML=""

products.forEach((p,i)=>{

let zap=localStorage.getItem('whatsappUrl')||''

let d=document.createElement("div")

d.className="product"

d.innerHTML=`

<img src="${p.img}">

<div class="product-info">

<div class="product-title">${p.title}</div>

<div class="price">R$ ${p.price}</div>

<a class="whats" target="_blank" href="${zap}?text=Tenho interesse em ${encodeURIComponent(p.title)}">

Comprar no WhatsApp

</a>

</div>

`

box.appendChild(d)

})

}

function searchProducts(){

let input=document.getElementById("searchInput").value.toLowerCase()

let products=JSON.parse(localStorage.getItem('products')||'[]')

let box=document.getElementById("products")

box.innerHTML=""

products.filter(p=>p.title.toLowerCase().includes(input))
.forEach((p,i)=>{

let zap=localStorage.getItem('whatsappUrl')||''

let d=document.createElement("div")

d.className="product"

d.innerHTML=`

<img src="${p.img}">

<div class="product-info">

<div class="product-title">${p.title}</div>

<div class="price">R$ ${p.price}</div>

<a class="whats" target="_blank" href="${zap}?text=Tenho interesse em ${encodeURIComponent(p.title)}">

Comprar no WhatsApp

</a>

</div>

`

box.appendChild(d)

})

}

loadProducts()

</script>

</body>
</html>
