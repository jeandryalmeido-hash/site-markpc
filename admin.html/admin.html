<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin MongoDB - TechPrime</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #07111f;
      color: #f5f7fb;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      margin-top: 24px;
      padding: 24px;
      border-radius: 16px;
      background: rgba(10, 20, 40, 0.9);
      border: 1px solid rgba(255,255,255,0.08);
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      background: #4f8cff;
      color: white;
      margin-bottom: 20px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    a {
      color: #9cc2ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Área administrativa</h1>
    <p><a href="/">Voltar para o site</a></p>

    <div class="card">
      <button onclick="salvarCliente()">Testar MongoDB</button>

      <h3 style="margin-bottom: 12px;">Clientes cadastrados</h3>
      <ul id="lista-clientes"></ul>
    </div>
  </div>

  <script>
    const ADMIN_CHAVE = "markadmin";
    const ADMIN_SENHA = "1290";

    function verificarAdmin() {
      const params = new URLSearchParams(window.location.search);
      const admin = params.get("admin");

      if (sessionStorage.getItem("admin_ok") === "1") {
        carregarClientes();
        return;
      }

      if (admin === ADMIN_CHAVE) {
        const senha = prompt("Digite a senha do admin:");
        if (senha === ADMIN_SENHA) {
          sessionStorage.setItem("admin_ok", "1");
          carregarClientes();
          return;
        }
      }

      document.body.innerHTML = `
        <div style="padding:40px;font-family:Arial;color:white;background:#07111f;min-height:100vh">
          <h1>Acesso restrito</h1>
          <p>Abra com a chave correta.</p>
        </div>
      `;
    }

    async function salvarCliente() {
      await fetch("/api/salvar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          nome: "Teste funcionando"
        })
      });

      alert("Salvo no banco!");
      carregarClientes();
    }

    async function carregarClientes() {
      const res = await fetch("/api/salvar");
      const clientes = await res.json();

      const lista = document.getElementById("lista-clientes");
      lista.innerHTML = "";

      clientes.reverse().forEach(cliente => {
        lista.innerHTML += `
          <li>
            <strong style="font-size: 18px;">${cliente.nome}</strong><br>
            <small>${new Date(cliente.criadoEm).toLocaleString()}</small>
          </li>
        `;
      });
    }

    verificarAdmin();
  </script>
</body>
</html>
