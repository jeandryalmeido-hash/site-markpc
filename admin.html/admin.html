<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | MarkPC</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="admin-body">
  <header class="topbar">
    <div class="container topbar-content">
      <a href="./index.html" class="logo">
        <span class="logo-mark">Mark</span><span class="logo-pc">PC</span>
      </a>

      <nav class="nav">
        <a href="./index.html">Voltar ao site</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container admin-layout">
      <section class="admin-card">
        <div class="section-head admin-head">
          <div>
            <span class="section-kicker">Painel administrativo</span>
            <h2>Cadastrar produto</h2>
          </div>
          <button id="btn-testar-conexao" class="btn btn-outline" type="button">
            Testar conexão
          </button>
        </div>

        <form id="produto-form" class="admin-form">
          <div class="form-grid">
            <div class="field">
              <label for="nome">Nome</label>
              <input id="nome" name="nome" type="text" required />
            </div>

            <div class="field">
              <label for="categoria">Categoria</label>
              <input id="categoria" name="categoria" type="text" required />
            </div>

            <div class="field">
              <label for="imagem">Imagem (URL)</label>
              <input id="imagem" name="imagem" type="url" placeholder="https://..." />
            </div>

            <div class="field">
              <label for="preco">Preço normal</label>
              <input id="preco" name="preco" type="number" step="0.01" min="0" />
            </div>

            <div class="field">
              <label for="precoPromocional">Preço promocional</label>
              <input id="precoPromocional" name="precoPromocional" type="number" step="0.01" min="0" />
            </div>

            <div class="field">
              <label for="linkCompra">Link de compra</label>
              <input id="linkCompra" name="linkCompra" type="url" placeholder="https://..." />
            </div>
          </div>

          <div class="field">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="4"></textarea>
          </div>

          <div class="checks">
            <label><input id="destaque" type="checkbox" /> Destaque</label>
            <label><input id="oculto" type="checkbox" /> Oculto</label>
            <label><input id="emEstoque" type="checkbox" checked /> Em estoque</label>
          </div>

          <div class="admin-actions">
            <button class="btn btn-primary" type="submit">Salvar produto</button>
            <button class="btn btn-outline" type="reset">Limpar</button>
          </div>
        </form>

        <div id="status" class="status-box">Aguardando ação...</div>
      </section>

      <section class="admin-card">
        <div class="section-head admin-head">
          <div>
            <span class="section-kicker">Gerenciamento</span>
            <h2>Produtos cadastrados</h2>
          </div>
          <button id="btn-atualizar-lista" class="btn btn-outline" type="button">
            Atualizar lista
          </button>
        </div>

        <div id="admin-produtos-lista" class="admin-products-list">
          <div class="empty-card">Carregando lista...</div>
        </div>
      </section>
    </div>
  </main>

  <script src="./admin.js"></script>
</body>
</html>
