<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#0b0d12,#1a1d24);
color:#fff;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
width:300px;
text-align:center;
animation:fade 0.6s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#6c3bff;
color:#fff;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #6c3bff;
}

.error{
color:red;
display:none;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h2>🔒 Login Admin</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="error" class="error">Login incorreto</div>
</div>

<script>
if(localStorage.admin === 'true'){
window.location.href='admin.html'
}

function login(){
if(user.value==='admin' && pass.value==='1234'){
localStorage.admin='true'
window.location.href='admin.html'
}else{
error.style.display='block'
}
}
</script>

</body>
</html>
